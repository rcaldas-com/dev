services:
  web:
    image: registry.rcaldas.com/rcaldas/web:1.21
    restart: unless-stopped
    ports:
      - "8611:3000"
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 128M
    depends_on:
      - redis
  wallet:
    image: registry.rcaldas.com/rcaldas/wallet:1.0
    restart: unless-stopped
    ports:
      - "8613:3000"
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 128M
    depends_on:
      - redis
      - ccxt
  ccxt:
    image: registry.rcaldas.com/rcaldas/ccxt:1.0
    restart: unless-stopped
    environment:
      CCXT_EXCHANGES: binance,kraken,okx
      CCXT_CACHE_TTL: "10"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M
  emailer:
    image: registry.rcaldas.com/rcaldas/emailer:1.1
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./emailer/templates:/app/templates:ro
    networks:
      - default
      - mailu_default
    deploy:
      resources:
        limits:
          memory: 500M
        reservations:
          memory: 64M
    depends_on:
      - redis
  redis:
    image: redis:8-alpine
    container_name: rcweb-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          memory: 500M
        reservations:
          memory: 64M
networks:
  mailu_default:
    external: true
volumes:
  redis-data:
