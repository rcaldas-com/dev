services:
  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - 8001:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web
      - wallet
  web:
    build: web/
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./web/app:/app/app
      - ./web/components:/app/components
      - ./web/lib:/app/lib
      - ./web/public:/app/public
      - ./web/middleware.ts:/app/middleware.ts
      - ./web/package.json:/app/package.json
      - ./web/package-lock.json:/app/package-lock.json
    depends_on:
      - mongo
      - redis
  wallet:
    build: wallet/
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./wallet/app:/app/app
      - ./wallet/public:/app/public
      - ./wallet/middleware.ts:/app/middleware.ts
      - ./wallet/next.config.js:/app/next.config.js
      - ./wallet/tsconfig.json:/app/tsconfig.json
      - ./wallet/postcss.config.mjs:/app/postcss.config.mjs
      - ./wallet/tailwind.config.ts:/app/tailwind.config.ts
      - ./wallet/eslint.config.mjs:/app/eslint.config.mjs
      - ./wallet/package.json:/app/package.json
      - ./wallet/package-lock.json:/app/package-lock.json
    depends_on:
      - mongo
      - redis
      - ccxt
  ccxt:
    build: ./ccxt
    restart: unless-stopped
    environment:
      CCXT_EXCHANGES: binance,kraken,okx
      CCXT_CACHE_TTL: "10"
  mongo:
    image: mongo:7
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - 27011:27017
    volumes:
      - ./db:/data/db
      - ./bkp:/dump
  redis:
    image: redis:8
    restart: unless-stopped
    volumes:
      - ./redis-data:/data
  emailer:
    build: ./emailer
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./emailer/app.py:/app/app.py
      - ./emailer/templates:/app/templates
