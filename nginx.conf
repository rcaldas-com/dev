events {}

http {
    server {
        listen 80;
        server_name localhost;
        client_max_body_size 64m;
        # WEB
        location / {
            proxy_pass http://web:3000;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
        }
        location /_next/webpack-hmr {
            proxy_pass http://web:3000/_next/webpack-hmr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            # proxy_cache_bypass $http_upgrade;
        }
        # WALLET - New simple approach
        location /wallet {
            return 301 $scheme://$http_host/wallet/;
        }
        
        location /wallet/ {
            rewrite ^/wallet/(.*)$ /$1 break;
            proxy_pass http://wallet:3000;
            proxy_redirect off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
        }
        
        # Lidar com hot reloading do webpack para o wallet
        location /wallet/_next/webpack-hmr {
            proxy_pass http://wallet:3000/_next/webpack-hmr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
